<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العربي للمقاولات - بناء وتشييد</title>
    <meta name="theme-color" content="#1a1a2e">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;color:#fff;overflow-x:hidden}
        
        /* ===== خلفية متحركة ===== */
        .bg-slideshow{position:fixed;top:0;left:0;width:100%;height:100vh;z-index:-1}
        .bg-slideshow .slide{position:absolute;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transition:opacity 1.5s ease}
        .bg-slideshow .slide.active{opacity:1}
        .bg-overlay{position:fixed;top:0;left:0;width:100%;height:100vh;background:rgba(0,0,0,.75);z-index:-1}
        
        /* ===== شاشة البداية ===== */
        .landing{position:fixed;top:0;left:0;width:100%;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1000;text-align:center;padding:20px;transition:opacity .8s,visibility .8s}
        .landing.hidden{opacity:0;visibility:hidden;pointer-events:none}
        .landing .logo{font-size:5rem;animation:float 3s infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
        .landing h1{font-size:3rem;font-weight:900;color:#d4af37;letter-spacing:5px;margin:10px 0;text-shadow:0 0 30px rgba(212,175,55,.6)}
        .landing .sub{font-size:1.3rem;color:#ccc}
        .landing .slogan{font-size:1rem;color:#888;margin:10px 0 30px}
        .btn-gold{padding:16px 50px;font-size:1.2rem;font-weight:700;background:linear-gradient(45deg,#d4af37,#b8960f);color:#000;border:none;border-radius:50px;cursor:pointer;transition:.3s}
        .btn-gold:hover{transform:scale(1.05);box-shadow:0 0 40px rgba(212,175,55,.6)}
        
        /* ===== المحتوى الرئيسي ===== */
        .main-content{min-height:100vh;display:none;padding-top:80px}
        .main-content.visible{display:block}
        
        .header{position:fixed;top:0;left:0;right:0;z-index:500;background:rgba(0,0,0,.9);padding:12px;text-align:center;border-bottom:2px solid #d4af37;backdrop-filter:blur(10px)}
        .header h2{font-size:1.4rem;color:#d4af37}
        
        .container{max-width:1000px;margin:0 auto;padding:20px}
        
        /* ===== تصنيفات ===== */
        .cats{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:25px}
        .cats button{padding:10px 20px;font-size:.85rem;font-weight:600;background:rgba(0,0,0,.5);border:1px solid #d4af37;color:#d4af37;border-radius:50px;cursor:pointer;transition:.3s;backdrop-filter:blur(5px)}
        .cats button.active,.cats button:hover{background:#d4af37;color:#000}
        
        /* ===== معرض ===== */
        .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px}
        .card{position:relative;border-radius:15px;overflow:hidden;background:rgba(0,0,0,.6);border:1px solid rgba(212,175,55,.3);cursor:pointer;transition:.3s;backdrop-filter:blur(5px)}
        .card:hover{transform:translateY(-8px);border-color:#d4af37;box-shadow:0 15px 40px rgba(212,175,55,.3)}
        .card img{width:100%;height:200px;object-fit:cover}
        .card .info{padding:15px;text-align:center}
        .card .info h3{font-size:1rem;color:#d4af37;margin-bottom:5px}
        .card .info p{font-size:.8rem;color:#aaa;line-height:1.6}
        .card .badge{position:absolute;top:10px;right:10px;background:#d4af37;color:#000;padding:4px 12px;border-radius:20px;font-size:.7rem;font-weight:700}
        
        /* ===== مودال ===== */
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100vh;background:rgba(0,0,0,.95);z-index:2000;justify-content:center;align-items:center;padding:15px}
        .modal.active{display:flex}
        .modal-content{width:100%;max-width:500px;background:#1a1a1a;border:1px solid #d4af37;border-radius:15px;overflow:hidden;max-height:85vh;overflow-y:auto}
        .modal img{width:100%;max-height:300px;object-fit:cover;border-bottom:2px solid #d4af37}
        .modal .m-info{padding:20px;text-align:center}
        .modal .m-info h3{font-size:1.4rem;color:#d4af37;margin-bottom:10px}
        .modal .m-info .desc{font-size:.9rem;color:#aaa;line-height:1.8;margin-bottom:15px}
        .close-modal{position:absolute;top:10px;left:10px;background:#d4af37;border:none;color:#000;width:35px;height:35px;border-radius:50%;cursor:pointer;font-weight:700;font-size:1.2rem}
        
        .btn-back{margin:20px auto;padding:12px 30px;background:transparent;border:1px solid #d4af37;color:#d4af37;font-size:1rem;border-radius:30px;cursor:pointer;display:block}
        
        /* ===== تواصل ===== */
        .contact{background:rgba(0,0,0,.6);border:1px solid rgba(212,175,55,.4);border-radius:15px;padding:25px;text-align:center;margin:20px 0;backdrop-filter:blur(10px)}
        .contact h2{color:#d4af37;margin-bottom:20px}
        .contact .phone{font-size:1.5rem;font-weight:900;direction:ltr;margin:10px 0}
        .contact .phone i{color:#25D366;margin:0 5px}
        .contact .call-btn{display:inline-block;margin:8px;padding:10px 25px;background:#25D366;color:#000;border-radius:50px;text-decoration:none;font-weight:700}
        
        /* ===== توقيع ===== */
        .signature{background:rgba(0,0,0,.6);border:1px solid rgba(212,175,55,.4);border-radius:15px;padding:25px;text-align:center;margin:20px 0;backdrop-filter:blur(10px)}
        .signature .f-name{font-size:1.3rem;font-weight:900;color:#d4af37;margin:10px 0}
        .signature .social{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:15px}
        .signature .social a{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;border-radius:50px;text-decoration:none;font-size:.85rem;font-weight:600;color:#fff;transition:.3s}
        .signature .social a:hover{transform:scale(1.05)}
        .signature .social .wa{background:#25D366}.signature .social .fb{background:#1877F2}
        .signature .social .ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
        .signature .social .tt{background:#000;border:1px solid #fff}
    </style>
</head>
<body>

<!-- ===== خلفية متحركة ===== -->
<div class="bg-slideshow" id="bgSlideshow">
    <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1200')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?w=1200')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=1200')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1590279765347-8c5f1b8e0a5c?w=1200')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1200')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1600047509807-ba8f99d2cdde?w=1200')"></div>
</div>
<div class="bg-overlay"></div>

<!-- ===== شاشة البداية ===== -->
<div class="landing" id="landing">
    <div class="logo">🏗️</div>
    <h1>العربي للمقاولات</h1>
    <div class="sub">بناء وتشييد - ترميم - تشطيبات</div>
    <div class="slogan">✨ نبني مستقبلك بجودة عالمية ✨</div>
    <button class="btn-gold" id="startBtn">🏗️ تصفح أعمالنا</button>
</div>

<!-- ===== المحتوى الرئيسي ===== -->
<div class="main-content" id="main">
    <div class="header"><h2>🏗️ العربي للمقاولات</h2></div>
    
    <div class="container">
        <div class="cats" id="cats">
            <button class="active" data-cat="all">✨ الكل</button>
            <button data-cat="buildings">🏢 عمارات سكنية</button>
            <button data-cat="villas">🏡 فلل وقصور</button>
            <button data-cat="commercial">🏬 محلات تجارية</button>
            <button data-cat="entertainment">🎯 أماكن ترفيهية</button>
            <button data-cat="restoration">🔧 ترميم وتشطيبات</button>
        </div>
        <div class="gallery" id="gallery"></div>
        <button class="btn-back" id="backBtn">🏠 العودة للرئيسية</button>
        
        <div class="contact">
            <h2>📞 للتواصل</h2>
            <div class="phone"><i class="fab fa-whatsapp"></i> 01100257625</div>
            <a href="tel:01100257625" class="call-btn">📞 اتصال الآن</a>
            <p style="color:#aaa;margin-top:10px;font-size:.8rem">✅ مقاولات عامة | بناء وتشييد | ترميم | تشطيبات | ديكورات</p>
        </div>
        
        <div class="signature">
            ⚡ صُنع بواسطة<br>
            <span class="f-name">البشمهندس مازن العربي</span>
            <div class="social">
                <a href="https://wa.me/201100257625" class="wa"><i class="fab fa-whatsapp"></i> واتساب</a>
                <a href="https://www.facebook.com/share/1J5pRHd8g5/" class="fb"><i class="fab fa-facebook-f"></i> فيسبوك</a>
                <a href="https://www.instagram.com/mazenalaraby10" class="ig"><i class="fab fa-instagram"></i> انستجرام</a>
                <a href="https://www.tiktok.com/@mazenmohamedalaraby" class="tt"><i class="fab fa-tiktok"></i> تيك توك</a>
            </div>
            <span style="font-size:.7rem;opacity:.5;display:block;margin-top:10px">© 2026 جميع الحقوق محفوظة</span>
        </div>
    </div>
</div>

<!-- ===== مودال التفاصيل ===== -->
<div class="modal" id="modal">
    <div class="modal-content">
        <button class="close-modal" id="closeModal">✕</button>
        <img id="modalImg" src="" alt="">
        <div class="m-info">
            <h3 id="modalName"></h3>
            <div class="desc" id="modalDesc"></div>
        </div>
    </div>
</div>

<script>
// ===== خلفية متحركة =====
var slides = document.querySelectorAll('#bgSlideshow .slide');
var currentSlide = 0;
setInterval(function(){
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
}, 4000);

// ===== رقم الواتساب =====
var YOUR_PHONE = '201100257625';

// ===== المشاريع =====
var projects = [
    {id:1, img:"https://images.unsplash.com/photo-1486325212027-8081e485255e?w=500&h=350&fit=crop", name:"عمارة النخيل السكنية", cat:"buildings", desc:"عمارة سكنية 12 دور - 48 شقة فاخرة. تم البناء بأحدث المواصفات الهندسية. واجهات زجاجية وجرانيت. مداخل رخام ومصاعد كهربائية."},
    {id:2, img:"https://images.unsplash.com/photo-1541888946425-d81bb19240f5?w=500&h=350&fit=crop", name:"برج السلام الإداري", cat:"buildings", desc:"برج إداري 20 دور. مكاتب فاخرة. نظام تكييف مركزي. 4 مصاعد. جراج تحت الأرض. أنظمة أمان ذكية."},
    {id:3, img:"https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=500&h=350&fit=crop", name:"فيلا الياسمين", cat:"villas", desc:"فيلا 600م² - 3 طوابق. مسبح خارجي. حديقة 200م². تشطيب سوبر لوكس. رخام إيطالي. مطبخ أمريكي."},
    {id:4, img:"https://images.unsplash.com/photo-1600047509807-ba8f99d2cdde?w=500&h=350&fit=crop", name:"قصر الأندلس", cat:"villas", desc:"قصر 1200م². 5 غرف نوم ماستر. 2 مسبح. ملحق خارجي. جلسات عربية. مدخل رخامي فخم. مصعد داخلي."},
    {id:5, img:"https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=500&h=350&fit=crop", name:"مول النخيل التجاري", cat:"commercial", desc:"مول تجاري 3 طوابق. 60 محل. هايبر ماركت. منطقة ألعاب. فود كورت. مواقف 500 سيارة."},
    {id:6, img:"https://images.unsplash.com/photo-1590279765347-8c5f1b8e0a5c?w=500&h=350&fit=crop", name:"سوق الذهب", cat:"commercial", desc:"سوق تجاري 40 محل. واجهات زجاجية. تكييف مركزي. أنظمة أمان. سلالم كهربائية."},
    {id:7, img:"https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500&h=350&fit=crop", name:"كافيه الروyal", cat:"entertainment", desc:"كافيه راقي 300م². ديكورات خشبية. جلسات داخلية وخارجية. إضاءة مخفية. بار متكامل. أنظمة صوت."},
    {id:8, img:"https://images.unsplash.com/photo-1552566626-52f8b828add9?w=500&h=350&fit=crop", name:"مطعم الشلال", cat:"entertainment", desc:"مطعم سياحي 500م². شلالات مائية. جلسات عائلية. تكييف. مطبخ مركزي. ديكورات طبيعية."},
    {id:9, img:"https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=500&h=350&fit=crop", name:"قاعة أفراح الياسمين", cat:"entertainment", desc:"قاعة 1000 شخص. مدخل فندقي. إضاءة ليزر. أنظمة صوت. مطبخ. بار. غرف VIP."},
    {id:10, img:"https://images.unsplash.com/photo-1582268611958-ebfd161ef9cf?w=500&h=350&fit=crop", name:"ترميم فيلا القلعة", cat:"restoration", desc:"ترميم فيلا تاريخية. إصلاح أساسات. ترميم واجهات. تحديث سباكة وكهرباء. دهانات. أرضيات رخام."},
    {id:11, img:"https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=500&h=350&fit=crop", name:"تشطيب شقة 200م", cat:"restoration", desc:"تشطيب سوبر لوكس. أرضيات باركيه. أسقف جبس. إضاءة مخفية. مطبخ راكب. تكييف مركزي."},
    {id:12, img:"https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=500&h=350&fit=crop", name:"عمارة الياقوت", cat:"buildings", desc:"عمارة 8 أدوار. 24 شقة. واجهة كلادينج. عازل حراري. خزان أرضي وعلوي. مصعد."},
];

var cats = {buildings:"عمارات", villas:"فلل", commercial:"تجاري", entertainment:"ترفيهي", restoration:"ترميم"};
var curCat = 'all';

function render(list){
    var g = document.getElementById('gallery'); g.innerHTML = '';
    if(!list.length){ g.innerHTML = '<div style="text-align:center;padding:40px;color:#888;grid-column:1/-1">😕 لا توجد مشاريع</div>'; return; }
    list.forEach(function(p){
        var c = document.createElement('div'); c.className = 'card'; c.onclick = function(){openModal(p);};
        c.innerHTML = '<img src="'+p.img+'" alt="'+p.name+'" loading="lazy"><div class="badge">'+cats[p.cat]+'</div><div class="info"><h3>'+p.name+'</h3><p>'+p.desc.substring(0,60)+'...</p></div>';
        g.appendChild(c);
    });
}

function filter(){
    var list = curCat === 'all' ? projects : projects.filter(function(p){return p.cat === curCat;});
    render(list);
}

var modal = document.getElementById('modal'), mImg = document.getElementById('modalImg'), mName = document.getElementById('modalName'), mDesc = document.getElementById('modalDesc');

function openModal(p){
    mImg.src = p.img;
    mName.textContent = p.name;
    mDesc.textContent = p.desc;
    modal.classList.add('active'); document.body.style.overflow = 'hidden';
}

function closeModal(){ modal.classList.remove('active'); document.body.style.overflow = ''; }
document.getElementById('closeModal').onclick = closeModal;
modal.onclick = function(e){ if(e.target === modal) closeModal(); };

document.querySelectorAll('#cats button').forEach(function(b){ b.onclick = function(){
    document.querySelectorAll('#cats button').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active'); curCat = b.getAttribute('data-cat'); filter();
};});

document.getElementById('startBtn').onclick = function(){ document.getElementById('landing').classList.add('hidden'); document.getElementById('main').classList.add('visible'); filter(); };
document.getElementById('backBtn').onclick = function(){ document.getElementById('landing').classList.remove('hidden'); document.getElementById('main').classList.remove('visible'); };
</script>
</body>
</html>
