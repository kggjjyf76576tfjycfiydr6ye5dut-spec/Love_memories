    var categoriesLabels = {buildings:"عمارات",villas:"فلل",commercial:"تجاري",entertainment:"ترفيهي",restoration:"ترميم"};
    var activeCategory = 'all';

    function displayProjects(list){
        var gallery = document.getElementById('projectsGallery');
        gallery.innerHTML = '';
        if(!list.length){gallery.innerHTML='<div style="text-align:center;padding:50px;color:#888;grid-column:1/-1;font-size:1.2rem">😕 لا توجد مشاريع مطابقة</div>';return}
        list.forEach(function(p){
            var card = document.createElement('div');
            card.className = 'project-card';
            card.onclick = function(){openModal(p)};
            card.innerHTML = '<img src="'+p.image+'" alt="'+p.title+'" loading="lazy"><div class="card-badge">'+categoriesLabels[p.category]+'</div><div class="card-info"><h3>'+p.title+'</h3><div class="card-stats">'+p.stats.map(function(s){return'<span>'+s+'</span>'}).join('')+'</div><p>'+p.description.substring(0,70)+'...</p></div>';
            gallery.appendChild(card);
        });
    }

    function filterProjects(){
        var list = activeCategory === 'all' ? projectsData : projectsData.filter(function(p){return p.category === activeCategory});
        displayProjects(list);
    }

    var modal = document.getElementById('projectModal');
    var modalImage = document.getElementById('modalImage');
    var modalTitle = document.getElementById('modalTitle');
    var modalStats = document.getElementById('modalStats');
    var modalDescription = document.getElementById('modalDescription');

    function openModal(p){
        modalImage.src = p.image;
        modalTitle.textContent = p.title;
        modalStats.innerHTML = p.stats.map(function(s){return'<span>'+s+'</span>'}).join('');
        modalDescription.textContent = p.description;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal(){modal.classList.remove('active');document.body.style.overflow = ''}
    document.getElementById('closeModalBtn').onclick = closeModal;
    modal.onclick = function(e){if(e.target === modal)closeModal()};

    document.querySelectorAll('#categoriesBar .cat-btn').forEach(function(btn){
        btn.onclick = function(){
            document.querySelectorAll('#categoriesBar .cat-btn').forEach(function(b){b.classList.remove('active')});
            btn.classList.add('active');
            activeCategory = btn.getAttribute('data-category');
            filterProjects();
        };
    });

    document.getElementById('startBtn').onclick = function(){
        document.getElementById('landingPage').classList.add('hidden');
        document.getElementById('mainContent').classList.add('visible');
        filterProjects();
    };

    document.getElementById('backBtn').onclick = function(){
        document.getElementById('landingPage').classList.remove('hidden');
        document.getElementById('mainContent').classList.remove('visible');
    };
</script>
