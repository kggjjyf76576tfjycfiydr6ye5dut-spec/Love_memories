<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكريات حبنا</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #1a0a0a;
            overflow-x: hidden;
        }

        /* ===== حماية من التصوير ===== */
        .protected-content {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== تحذير التصوير ===== */
        .screenshot-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 99999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .screenshot-warning.show {
            display: flex;
        }

        .screenshot-warning .warning-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: shake 0.5s infinite;
        }

        .screenshot-warning h2 {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            color: #ff4d6d;
            margin-bottom: 15px;
            text-shadow: 0 0 20px #ff4d6d;
        }

        .screenshot-warning p {
            font-family: 'Cairo', sans-serif;
            font-size: 1.3rem;
            color: #ffd1dc;
            opacity: 0.8;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
            75% { transform: rotate(-5deg); }
        }

        /* ===== أمطار القلوب (الخلفية) ===== */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .floating-heart {
            position: absolute;
            top: -50px;
            animation: fall linear infinite;
            pointer-events: none;
            user-select: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.5);
                opacity: 0.9;
            }
            100% {
                transform: translateY(110vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        /* ===== شاشة كلمة السر ===== */
        .password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle at center, #2d0a1b, #0a0202);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .password-box {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #ff4d6d;
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 77, 109, 0.5);
            max-width: 400px;
            width: 90%;
        }

        .lock-icon {
            font-size: 5rem;
            display: block;
            margin-bottom: 15px;
        }

        .password-box h2 {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            color: #ffd1dc;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff4d6d;
        }

        .password-box input {
            width: 100%;
            padding: 14px 20px;
            font-size: 1.4rem;
            font-family: 'Cairo', sans-serif;
            border: 2px solid #ff4d6d;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.5);
            color: #ffd1dc;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
            direction: ltr;
        }

        .password-box button {
            padding: 14px 50px;
            font-size: 1.4rem;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            background: linear-gradient(45deg, #ff4d6d, #c9184a);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px #ff4d6d;
        }

        .error-msg {
            color: #ff4d6d;
            font-family: 'Amiri', serif;
            font-size: 1.3rem;
            margin-top: 15px;
            display: block;
            min-height: 30px;
            animation: none;
        }

        .error-msg.shake {
            animation: shakeMsg 0.5s ease;
        }

        @keyframes shakeMsg {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-8px); }
        }

        /* ===== شاشة البداية ===== */
        .landing {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle at center, #4a0e2b, #1a0a0a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .landing.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .heart-animation {
            font-size: 6rem;
            animation: heartbeat 1.2s infinite;
            margin-bottom: 20px;
            color: #ff4d6d;
            text-shadow: 0 0 20px #ff4d6d;
            user-select: none;
            pointer-events: none;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(1); }
            75% { transform: scale(1.15); }
        }

        .landing h1 {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            color: #ffd1dc;
            text-shadow: 0 0 10px #ff4d6d;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-align: center;
        }

        .start-btn {
            padding: 15px 50px;
            font-size: 1.8rem;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            background: linear-gradient(45deg, #ff4d6d, #c9184a);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px #ff4d6d;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .start-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 45px #ff758f;
            background: linear-gradient(45deg, #ff758f, #c9184a);
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            min-height: 100vh;
            background: linear-gradient(135deg, #2d0a1b, #0f0505);
            padding: 0 20px 20px;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .main-content.visible {
            display: flex;
        }

        /* ===== هيدر ثابت ===== */
        .main-header {
            text-align: center;
            color: #ffd1dc;
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            text-shadow: 0 0 15px #ff4d6d;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(45, 10, 27, 0.95);
            padding: 20px 15px;
            width: 100%;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255, 77, 109, 0.4);
            margin-bottom: 30px;
        }

        /* ===== معرض عمودي ===== */
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 90%;
            max-width: 600px;
            padding-bottom: 30px;
        }

        /* ===== كارد الصورة ===== */
        .card {
            position: relative;
            border-radius: 25px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            aspect-ratio: 3/4;
            background: #3a0d1c;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(255, 77, 109, 0.4);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.4s;
            pointer-events: none;
            -webkit-user-drag: none;
            user-drag: none;
        }

        .card:hover img {
            filter: brightness(0.85);
        }

        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            color: #fff;
            padding: 30px 20px;
            font-size: 1.6rem;
            font-family: 'Amiri', serif;
            text-align: center;
            opacity: 0.95;
            transition: all 0.3s;
        }

        .card:hover .card-overlay {
            opacity: 1;
            padding-bottom: 35px;
        }

        /* ===== المودال ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            width: 700px;
            background: #1e1e2f;
            border-radius: 30px;
            overflow: visible;
            box-shadow: 0 0 50px rgba(255, 77, 109, 0.5);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-image {
            width: 100%;
            max-height: 50vh;
            object-fit: cover;
            border-bottom: 3px solid #ff4d6d;
            border-radius: 30px 30px 0 0;
            pointer-events: none;
            -webkit-user-drag: none;
            user-drag: none;
        }

        .modal-poem {
            padding: 30px 25px;
            font-family: 'Amiri', serif;
            font-size: 2rem;
            color: #ffd1dc;
            text-align: center;
            line-height: 1.8;
            background: #1e1e2f;
            text-shadow: 0 0 5px #ff4d6d;
            direction: rtl;
            border-radius: 0 0 30px 30px;
        }

        .close-modal {
            position: absolute;
            top: -15px;
            left: -15px;
            background: #ff4d6d;
            border: none;
            color: white;
            font-size: 1.8rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            z-index: 10;
            box-shadow: 0 0 20px #ff4d6d;
            font-weight: bold;
        }

        .close-modal:hover {
            background: #ff1a3d;
            transform: scale(1.15);
        }

        /* ===== قلوب المودال المنبثقة ===== */
        .modal-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
            border-radius: 30px;
        }

        .modal-heart {
            position: absolute;
            animation: popUp 2s ease-out forwards;
            pointer-events: none;
            user-select: none;
        }

        @keyframes popUp {
            0% {
                transform: translateY(0) scale(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translateY(-100px) scale(1.5) rotate(180deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-250px) scale(0.2) rotate(360deg);
                opacity: 0;
            }
        }

        .back-home {
            margin-top: 20px;
            margin-bottom: 20px;
            padding: 12px 35px;
            background: transparent;
            border: 2px solid #ff4d6d;
            color: #ffd1dc;
            font-size: 1.3rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
        }

        .back-home:hover {
            background: #ff4d6d;
            color: white;
            box-shadow: 0 0 25px #ff4d6d;
        }

        /* ===== توقيع البشمهندس مازن ===== */
        .footer-credit {
            text-align: center;
            padding: 30px 20px;
            margin-top: 10px;
            margin-bottom: 30px;
            color: #ffd1dc;
            font-family: 'Cairo', sans-serif;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 77, 109, 0.4);
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.2);
            backdrop-filter: blur(10px);
        }

        .footer-credit .title {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 5px;
            display: block;
        }

        .footer-credit .name {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ff4d6d, #ff758f, #ff4d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            animation: glowText 2s infinite;
            letter-spacing: 2px;
        }

        @keyframes glowText {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.5); }
        }

        .footer-credit .emoji {
            font-size: 2rem;
            animation: bounceEmoji 1s infinite;
            display: inline-block;
            margin: 0 5px;
        }

        @keyframes bounceEmoji {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .footer-credit .copyright {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-top: 8px;
            display: block;
        }

        @media (max-width: 600px) {
            .landing h1 {
                font-size: 2.5rem;
            }
            .start-btn {
                font-size: 1.5rem;
                padding: 12px 35px;
            }
            .modal-poem {
                font-size: 1.5rem;
            }
            .gallery {
                width: 95%;
                gap: 20px;
            }
            .card-overlay {
                font-size: 1.3rem;
                padding: 20px 15px;
            }
            .password-box h2 {
                font-size: 1.6rem;
            }
            .main-header {
                font-size: 1.8rem;
                padding: 15px 10px;
            }
            .footer-credit .name {
                font-size: 1.7rem;
            }
            .screenshot-warning h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body class="protected-content">

    <!-- ===== تحذير التصوير ===== -->
    <div class="screenshot-warning" id="screenshotWarning">
        <div class="warning-icon">🚫📸</div>
        <h2>عذراً .. التصوير ممنوع!</h2>
        <p>هذه الذكريات خاصة جداً ولا يمكن تصويرها 💕</p>
    </div>

    <!-- ===== أمطار القلوب (الخلفية) ===== -->
    <div class="hearts-container" id="heartsContainer"></div>

    <!-- ===== شاشة كلمة السر ===== -->
    <div class="password-screen" id="passwordScreen">
        <div class="password-box">
            <span class="lock-icon">🔐</span>
            <h2>أدخلي كلمة السر<br>يا روحي 🥀</h2>
            <input type="password" id="passwordInput" placeholder="••••">
            <button id="passwordBtn">💕 دخول</button>
            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

    <!-- ===== شاشة البداية ===== -->
    <div class="landing" id="landingPage">
        <div class="heart-animation">❤️</div>
        <h1>ذكريات حبنا</h1>
        <button class="start-btn" id="startBtn">لنبدأ ذكريات حبنا</button>
    </div>

    <!-- ===== المحتوى الرئيسي ===== -->
    <div class="main-content" id="mainContent">
        <!-- ===== هيدر ثابت ===== -->
        <div class="main-header">
            <h2>📜 معرض قصائد الحب والغرام</h2>
        </div>
        <div class="gallery" id="galleryContainer"></div>
        <button class="back-home" id="backToLandingBtn">💔 العودة للبداية</button>

        <!-- ===== توقيع البشمهندس مازن ===== -->
        <div class="footer-credit">
            <span class="emoji">⚡</span>
            <span class="title">صُنع بواسطة</span>
            <span class="emoji">👨‍💻</span>
            <br>
            <span class="name">البشمهندس مازن العربي</span>
            <br>
            <span class="copyright">© 2026 جميع الحقوق محفوظة</span>
        </div>
    </div>

    <!-- ===== المودال ===== -->
    <div class="modal" id="poemModal">
        <div class="modal-content">
            <button class="close-modal" id="closeModalBtn">✕</button>
            <div class="modal-hearts" id="modalHearts"></div>
            <img class="modal-image" id="modalImage" src="" alt="صورة حب">
            <div class="modal-poem" id="modalPoemText"></div>
        </div>
    </div>

    <script>
        // ===== 0. منع التصوير =====
        (function() {
            var warning = document.getElementById('screenshotWarning');
            var warningTimeout;

            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                showWarning();
                return false;
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'PrintScreen') {
                    e.preventDefault();
                    showWarning();
                    return false;
                }
                if ((e.ctrlKey || e.metaKey) && 
                    (e.key === 's' || e.key === 'S' ||
                     e.key === 'u' || e.key === 'U' ||
                     e.key === 'p' || e.key === 'P' ||
                     (e.shiftKey && (e.key === 'i' || e.key === 'I' || e.key === 'j' || e.key === 'J' || e.key === 'c' || e.key === 'C')))) {
                    e.preventDefault();
                    showWarning();
                    return false;
                }
            });

            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    showWarning();
                }
            });

            window.addEventListener('blur', function() {
                showWarning();
            });

            function showWarning() {
                warning.classList.add('show');
                clearTimeout(warningTimeout);
                warningTimeout = setTimeout(function() {
                    warning.classList.remove('show');
                }, 3000);
            }

            var style = document.createElement('style');
            style.textContent = '@media print { body { display: none !important; } }';
            document.head.appendChild(style);
        })();

        // ===== 1. أمطار القلوب في الخلفية =====
        (function() {
            var container = document.getElementById('heartsContainer');
            var hearts = ['❤️', '💕', '💗', '💖', '💘', '💝', '💟', '♥️', '💓', '🩷', '💞', '❣️'];

            function makeHeart() {
                var h = document.createElement('span');
                h.className = 'floating-heart';
                h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                h.style.left = Math.random() * 100 + '%';
                h.style.fontSize = (Math.random() * 2 + 1.5) + 'rem';
                h.style.animationDuration = (Math.random() * 5 + 4) + 's';
                h.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(h);
                setTimeout(function() {
                    if (h.parentNode) h.parentNode.removeChild(h);
                }, 10000);
            }

            setInterval(makeHeart, 500);
            for (var i = 0; i < 8; i++) {
                setTimeout(makeHeart, i * 400);
            }
        })();

        // ===== 2. كلمة السر =====
        (function() {
            var PASSWORD = 'Love';
            var screen = document.getElementById('passwordScreen');
            var input = document.getElementById('passwordInput');
            var btn = document.getElementById('passwordBtn');
            var error = document.getElementById('errorMsg');

            function check() {
                if (input.value === PASSWORD) {
                    screen.style.display = 'none';
                    document.body.style.overflow = '';
                    error.textContent = '';
                } else {
                    error.textContent = 'ركزي يا عيوني واكتبي رموز عشقي 💕';
                    error.classList.remove('shake');
                    void error.offsetWidth;
                    error.classList.add('shake');
                    input.value = '';
                    input.focus();
                }
            }

            btn.onclick = check;
            input.onkeydown = function(e) {
                if (e.key === 'Enter') {
                    check();
                }
            };
        })();

        // ===== 3. بيانات الحب (بمسارات img1 إلى img6) =====
        var loveData = [
            {
                img: "img1",
                poem: "عيناكِ بحرٌ أغرقُ فيه بلا نجاة ❤️",
                hearts: ['❤️', '💕', '💗', '💖', '💘', '💝', '💟', '♥️']
            },
            {
                img: "img2",
                poem: "أحبكِ عدد أنفاسي وأنفاسك ✨",
                hearts: ['💛', '🧡', '💚', '💙', '💜', '🩷', '🤍', '🩵']
            },
            {
                img: "img3",
                poem: "في قلبي حديقةٌ لا تزهر إلا بكِ 🌹",
                hearts: ['💝', '💖', '💗', '💓', '💞', '💕', '❤️', '💘']
            },
            {
                img: "img4",
                poem: "لوناكِ تغار منه الورود 🌷",
                hearts: ['🌸', '💮', '🌺', '🌷', '🌹', '💐', '🪷', '🏵️']
            },
            {
                img: "img5",
                poem: "لو كان الحب كلمات لكتبتكِ ديواناً 📖",
                hearts: ['💘', '❣️', '💟', '♥️', '💌', '💋', '🫶', '💑']
            },
            {
                img: "img6",
                poem: "أنتِ العمر وأجمَلُ أيامه 🕊️",
                hearts: ['🕊️', '💫', '✨', '🌟', '⭐', '💖', '💝', '💗']
            }
        ];

        // ===== 4. عناصر الصفحة =====
        var landingPage = document.getElementById('landingPage');
        var mainContent = document.getElementById('mainContent');
        var startBtn = document.getElementById('startBtn');
        var backBtn = document.getElementById('backToLandingBtn');
        var galleryContainer = document.getElementById('galleryContainer');
        var poemModal = document.getElementById('poemModal');
        var closeModalBtn = document.getElementById('closeModalBtn');
        var modalImage = document.getElementById('modalImage');
        var modalPoemText = document.getElementById('modalPoemText');
        var modalHearts = document.getElementById('modalHearts');

        // ===== 5. إنشاء الكاردات عمودية =====
        function createCards() {
            galleryContainer.innerHTML = '';
            loveData.forEach(function(item, index) {
                var card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-index', index);
                card.innerHTML = '<img src="' + item.img + '" alt="صورة حب ' + (index + 1) + '" loading="lazy"><div class="card-overlay">' + item.poem + '</div>';
                card.onclick = function() { openModal(index); };
                galleryContainer.appendChild(card);
            });
        }

        // ===== 6. قلوب منبثقة خاصة بكل صورة =====
        function spawnModalHearts(heartArray) {
            modalHearts.innerHTML = '';
            var colors = heartArray || ['❤️', '💕', '💗', '💖', '💘'];

            for (var i = 0; i < 25; i++) {
                (function(idx) {
                    setTimeout(function() {
                        var heart = document.createElement('span');
                        heart.className = 'modal-heart';
                        heart.textContent = colors[Math.floor(Math.random() * colors.length)];
                        heart.style.left = Math.random() * 100 + '%';
                        heart.style.top = (60 + Math.random() * 40) + '%';
                        heart.style.fontSize = (Math.random() * 3 + 1.5) + 'rem';
                        heart.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                        modalHearts.appendChild(heart);

                        setTimeout(function() {
                            if (heart.parentNode) heart.parentNode.removeChild(heart);
                        }, 3000);
                    }, idx * 80);
                })(i);
            }
        }

        // ===== 7. فتح وإغلاق المودال =====
        function openModal(index) {
            var item = loveData[index];
            modalImage.src = item.img;
            modalPoemText.textContent = item.poem;
            poemModal.classList.add('active');
            document.body.style.overflow = 'hidden';
            spawnModalHearts(item.hearts);
        }

        function closeModal() {
            poemModal.classList.remove('active');
            modalHearts.innerHTML = '';
            document.body.style.overflow = '';
        }

        // ===== 8. الأحداث =====
        startBtn.onclick = function() {
            landingPage.classList.add('hidden');
            mainContent.classList.add('visible');
            createCards();
        };

        backBtn.onclick = function() {
            landingPage.classList.remove('hidden');
            mainContent.classList.remove('visible');
            if (poemModal.classList.contains('active')) {
                closeModal();
            }
        };

        closeModalBtn.onclick = closeModal;

        poemModal.onclick = function(e) {
            if (e.target === poemModal) closeModal();
        };

        document.onkeydown = function(e) {
            if (e.key === 'Escape' && poemModal.classList.contains('active')) {
                closeModal();
            }
        };
    </script>
</body>
</html>
