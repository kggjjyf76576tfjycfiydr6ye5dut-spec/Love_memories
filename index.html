<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التركي - مستحضرات تجميل أصلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #faf8f5;
            overflow-x: hidden;
        }

        /* ===== شاشة البداية ===== */
        .landing {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1a0a2e, #2d1b69, #0a0a1a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .landing.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .landing .logo-icon {
            font-size: 6rem;
            margin-bottom: 20px;
            animation: float 3s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .landing .brand-title {
            font-family: 'Cairo', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            color: #d4af37;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .landing .brand-subtitle {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            color: #f0c75e;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .landing .brand-slogan {
            font-family: 'Cairo', sans-serif;
            font-size: 1.2rem;
            color: #fff;
            opacity: 0.7;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 1px;
        }

        .start-btn {
            padding: 18px 60px;
            font-size: 1.6rem;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            background: linear-gradient(45deg, #d4af37, #f0c75e);
            color: #1a0a2e;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.5);
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .start-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.8);
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            min-height: 100vh;
            background: #faf8f5;
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 130px;
        }

        .main-content.visible {
            display: flex;
        }

        /* ===== هيدر ثابت ===== */
        .main-header {
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 500;
            background: linear-gradient(135deg, #1a0a2e, #2d1b69);
            padding: 15px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
            border-bottom: 3px solid #d4af37;
        }

        .main-header .header-brand {
            font-family: 'Cairo', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: #d4af37;
            letter-spacing: 3px;
        }

        .main-header .header-tagline {
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            color: #f0c75e;
            opacity: 0.9;
        }

        /* ===== شريط التصنيفات ===== */
        .category-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 15px;
            width: 90%;
            max-width: 1200px;
            margin-bottom: 20px;
        }

        .category-btn {
            padding: 10px 25px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            background: white;
            border: 2px solid #d4af37;
            color: #1a0a2e;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover,
        .category-btn.active {
            background: #d4af37;
            color: white;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }

        /* ===== معرض المنتجات ===== */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 30px;
        }

        /* ===== كارد المنتج ===== */
        .card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: white;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            aspect-ratio: 3/4;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.3);
        }

        .card img {
            width: 100%;
            height: 70%;
            object-fit: cover;
            display: block;
        }

        .card-info {
            padding: 15px;
            text-align: center;
            background: white;
        }

        .card-info .product-name {
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #1a0a2e;
            margin-bottom: 5px;
        }

        .card-info .product-price {
            font-family: 'Cairo', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            color: #d4af37;
        }

        .card-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #d4af37;
            color: #1a0a2e;
            padding: 5px 15px;
            border-radius: 20px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* ===== المودال ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            width: 600px;
            background: white;
            border-radius: 30px;
            overflow: visible;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.5);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-image {
            width: 100%;
            max-height: 50vh;
            object-fit: cover;
            border-bottom: 3px solid #d4af37;
            border-radius: 30px 30px 0 0;
        }

        .modal-info {
            padding: 30px 25px;
            text-align: center;
            background: white;
            border-radius: 0 0 30px 30px;
        }

        .modal-info .modal-product-name {
            font-family: 'Cairo', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: #1a0a2e;
            margin-bottom: 10px;
        }

        .modal-info .modal-product-desc {
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.8;
        }

        .modal-info .modal-product-price {
            font-family: 'Cairo', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: #d4af37;
            margin-bottom: 20px;
        }

        .modal-info .order-btn {
            padding: 14px 40px;
            font-size: 1.3rem;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            background: linear-gradient(45deg, #d4af37, #f0c75e);
            color: #1a0a2e;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
        }

        .modal-info .order-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.7);
        }

        .close-modal {
            position: absolute;
            top: -15px;
            left: -15px;
            background: #d4af37;
            border: none;
            color: white;
            font-size: 1.8rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            z-index: 10;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            font-weight: bold;
        }

        .close-modal:hover {
            background: #1a0a2e;
            color: #d4af37;
            transform: scale(1.15);
        }

        /* ===== زرار العودة ===== */
        .back-home {
            margin: 20px;
            padding: 12px 35px;
            background: transparent;
            border: 2px solid #d4af37;
            color: #1a0a2e;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
        }

        .back-home:hover {
            background: #d4af37;
            color: white;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
        }

        /* ===== توقيع ===== */
        .footer-credit {
            text-align: center;
            padding: 30px 20px;
            margin: 20px;
            color: #1a0a2e;
            font-family: 'Cairo', sans-serif;
            background: white;
            border: 2px solid #d4af37;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.1);
        }

        .footer-credit .name {
            font-size: 1.5rem;
            font-weight: 900;
            color: #d4af37;
        }

        .social-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
        }

        .social-btn.whatsapp { background: #25D366; }
        .social-btn.facebook { background: #1877F2; }
        .social-btn.instagram { background: #E4405F; }
        .social-btn.tiktok { background: #000; }
        .social-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }

        .phone-number {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 50px;
            background: #faf8f5;
            border: 2px solid #d4af37;
            color: #1a0a2e;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            direction: ltr;
        }

        .phone-number i { color: #25D366; }

        @media (max-width: 600px) {
            .landing .brand-title { font-size: 2.5rem; }
            .landing .brand-subtitle { font-size: 1.3rem; }
            .start-btn { font-size: 1.3rem; padding: 14px 40px; }
            .gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; width: 95%; }
            .main-header .header-brand { font-size: 1.5rem; }
            .main-content { padding-top: 100px; }
            .category-btn { padding: 8px 18px; font-size: 0.9rem; }
            .modal-info .modal-product-name { font-size: 1.3rem; }
            .modal-info .modal-product-price { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- ===== شاشة البداية ===== -->
    <div class="landing" id="landingPage">
        <div class="logo-icon">💎</div>
        <div class="brand-title">التركي</div>
        <div class="brand-subtitle">مستحضرات تجميل أصلية 100%</div>
        <div class="brand-slogan">✨ أجود الماركات العالمية للعناية بالبشرة ✨</div>
        <button class="start-btn" id="startBtn">تصفح المنتجات</button>
    </div>

    <!-- ===== المحتوى الرئيسي ===== -->
    <div class="main-content" id="mainContent">
        <!-- ===== هيدر ثابت ===== -->
        <div class="main-header">
            <div class="header-brand">💎 التركي</div>
            <div class="header-tagline">مستحضرات تجميل أصلية - ماركات عالمية</div>
        </div>

        <!-- ===== شريط التصنيفات ===== -->
        <div class="category-bar" id="categoryBar">
            <button class="category-btn active" data-category="all">✨ الكل</button>
            <button class="category-btn" data-category="face">🧴 عناية بالوجه</button>
            <button class="category-btn" data-category="eyes">👁️ عناية بالعين</button>
            <button class="category-btn" data-category="lips">💋 عناية بالشفاه</button>
            <button class="category-btn" data-category="hair">💇‍♀️ عناية بالشعر</button>
            <button class="category-btn" data-category="body">🧴 عناية بالجسم</button>
            <button class="category-btn" data-category="makeup">💄 مكياج</button>
        </div>

        <!-- ===== معرض المنتجات ===== -->
        <div class="gallery" id="galleryContainer"></div>
        <button class="back-home" id="backToLandingBtn">🏠 العودة للرئيسية</button>

        <!-- ===== توقيع ===== -->
        <div class="footer-credit">
            <span>⚡ صُنع بواسطة</span>
            <br>
            <span class="name">البشمهندس مازن العربي</span>
            <div class="social-links">
                <span class="phone-number"><i class="fab fa-whatsapp"></i> 01100257625</span>
                <a href="https://wa.me/201100257625" target="_blank" class="social-btn whatsapp"><i class="fab fa-whatsapp"></i> واتساب</a>
                <a href="https://www.facebook.com/share/1J5pRHd8g5/?mibextid=wwXIfr" target="_blank" class="social-btn facebook"><i class="fab fa-facebook-f"></i> فيسبوك</a>
                <a href="https://www.instagram.com/mazenalaraby10?igsh=YnFhaGFlODhmcGw4&utm_source=qr" target="_blank" class="social-btn instagram"><i class="fab fa-instagram"></i> انستجرام</a>
                <a href="https://www.tiktok.com/@mazenmohamedalaraby?_r=1&_t=ZS-96I5OvpGIqY" target="_blank" class="social-btn tiktok"><i class="fab fa-tiktok"></i> تيك توك</a>
            </div>
            <span style="font-size:0.8rem;opacity:0.5;display:block;margin-top:10px;">© 2026 جميع الحقوق محفوظة</span>
        </div>
    </div>

    <!-- ===== المودال ===== -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="close-modal" id="closeModalBtn">✕</button>
            <img class="modal-image" id="modalImage" src="" alt="منتج">
            <div class="modal-info">
                <div class="modal-product-name" id="modalProductName"></div>
                <div class="modal-product-desc" id="modalProductDesc"></div>
                <div class="modal-product-price" id="modalProductPrice"></div>
                <button class="order-btn" onclick="window.open('https://wa.me/201100257625', '_blank')">
                    📞 اطلب الآن عبر واتساب
                </button>
            </div>
        </div>
    </div>

    <script>
        // ===== 1. بيانات المنتجات الـ 100 =====
        var categories = {
            face: '🧴 عناية بالوجه',
            eyes: '👁️ عناية بالعين',
            lips: '💋 عناية بالشفاه',
            hair: '💇‍♀️ عناية بالشعر',
            body: '🧴 عناية بالجسم',
            makeup: '💄 مكياج'
        };

        var productNames = {
            face: ['سيروم فيتامين سي', 'كريم ترطيب عميق', 'تونر منعش', 'ماسك وجه ذهبي', 'غسول وجه لطيف', 'كريم نهاري', 'كريم ليلي', 'سيرم هيالورونيك', 'مقشر وجه', 'واقي شمس', 'كريم أساس', 'برايمر', 'كونسيلر', 'بودرة تثبيت', 'بخاخ مثبت', 'جل الصبار'],
            eyes: ['كريم محيط العين', 'سيرم رموش', 'مزيل مكياج عيون', 'قلم حواجب', 'جل حواجب', 'ماسك عين'],
            lips: ['مرطب شفاه', 'مقشر شفاه', 'روج سائل', 'ملمع شفاه', 'قلم تحديد شفاه', 'ماسك شفاه'],
            hair: ['شامبو مغذي', 'بلسم مرطب', 'ماسك شعر', 'زيت شعر', 'سيرم شعر', 'بخاخ حماية حرارية'],
            body: ['لوشن جسم', 'مقشر جسم', 'زيت جسم', 'كريم تفتيح', 'مزيل عرق', 'صابون طبيعي'],
            makeup: ['باليت ظلال', 'ماسكارا', 'أيلاينر', 'أحمر خدود', 'هايلايتر', 'كونتور', 'بودرة وجه', 'بخاخ تثبيت']
        };

        var allCategories = Object.keys(categories);
        var products = [];

        // إنشاء 100 منتج
        for (var i = 1; i <= 100; i++) {
            var catIndex = (i - 1) % allCategories.length;
            var cat = allCategories[catIndex];
            var names = productNames[cat];
            var nameIndex = (i - 1) % names.length;
            var productName = names[nameIndex] + ' ' + (Math.floor((i - 1) / names.length) + 1);
            var price = (Math.floor(Math.random() * 400) + 150);

            products.push({
                id: i,
                img: 'img' + i,
                name: productName,
                category: cat,
                categoryName: categories[cat],
                price: price,
                desc: 'منتج أصلي 100% من أفضل الماركات العالمية. ' + categories[cat] + ' - ' + productName + '. منتج عالي الجودة للعناية المثالية.'
            });
        }

        // ===== 2. التصنيفات =====
        var currentCategory = 'all';

        var categoryBtns = document.querySelectorAll('.category-btn');
        categoryBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                categoryBtns.forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentCategory = btn.getAttribute('data-category');
                renderProducts();
            });
        });

        // ===== 3. عرض المنتجات =====
        function renderProducts() {
            var container = document.getElementById('galleryContainer');
            container.innerHTML = '';

            var filteredProducts = currentCategory === 'all' ? products : products.filter(function(p) {
                return p.category === currentCategory;
            });

            filteredProducts.forEach(function(product) {
                var card = document.createElement('div');
                card.className = 'card';
                card.onclick = function() { openModal(product); };

                card.innerHTML = `
                    <img src="${product.img}" alt="${product.name}" loading="lazy" onerror="this.style.background='#f0f0f0'; this.style.padding='20px'; this.style.objectFit='contain';">
                    <div class="card-badge">${product.categoryName.split(' ')[0]}</div>
                    <div class="card-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price} ج.م</div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // ===== 4. المودال =====
        var modal = document.getElementById('productModal');
        var modalImage = document.getElementById('modalImage');
        var modalProductName = document.getElementById('modalProductName');
        var modalProductDesc = document.getElementById('modalProductDesc');
        var modalProductPrice = document.getElementById('modalProductPrice');
        var closeModalBtn = document.getElementById('closeModalBtn');

        function openModal(product) {
            modalImage.src = product.img;
            modalImage.onerror = function() { this.style.background = '#f0f0f0'; this.style.objectFit = 'contain'; };
            modalProductName.textContent = product.name;
            modalProductDesc.textContent = product.desc;
            modalProductPrice.textContent = product.price + ' ج.م';
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        closeModalBtn.onclick = closeModal;
        modal.onclick = function(e) {
            if (e.target === modal) closeModal();
        };
        document.onkeydown = function(e) {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        };

        // ===== 5. أحداث =====
        var landingPage = document.getElementById('landingPage');
        var mainContent = document.getElementById('mainContent');
        var startBtn = document.getElementById('startBtn');
        var backBtn = document.getElementById('backToLandingBtn');

        startBtn.onclick = function() {
            landingPage.classList.add('hidden');
            mainContent.classList.add('visible');
            renderProducts();
        };

        backBtn.onclick = function() {
            landingPage.classList.remove('hidden');
            mainContent.classList.remove('visible');
            if (modal.classList.contains('active')) {
                closeModal();
            }
        };
    </script>
</body>
    </html>
